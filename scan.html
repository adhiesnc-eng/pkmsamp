<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Scanner Presensi - Masook AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #000; 
            overflow: hidden; 
            margin: 0;
            height: 100vh;
        }
        
        /* Fullscreen Video Background */
        .video-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }

        /* Masook Circular Frame Overlay */
        .cam-overlay {
            position: absolute;
            z-index: 10;
            inset: 0;
            background: rgba(15, 23, 42, 0.75); 
            mask: radial-gradient(circle 140px at center, transparent 99%, black 100%);
            -webkit-mask: radial-gradient(circle 140px at center, transparent 99%, black 100%);
        }

        .cam-frame-border {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 282px;
            height: 282px;
            border-radius: 50%;
            border: 4px solid #3b82f6;
            box-shadow: 0 0 40px rgba(59, 130, 246, 0.6);
            z-index: 11;
        }

        .scan-line {
            position: absolute;
            width: 100%;
            height: 4px;
            background: linear-gradient(to right, transparent, #3b82f6, transparent);
            animation: move 3s infinite ease-in-out;
            z-index: 12;
            top: 0;
        }

        @keyframes move {
            0%, 100% { top: 10%; opacity: 0.3; }
            50% { top: 90%; opacity: 1; }
        }

        /* Bottom Info Card */
        .bottom-card {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            padding: 24px 24px 45px 24px;
            border-top-left-radius: 40px;
            border-top-right-radius: 40px;
            z-index: 20;
            text-align: center;
            box-shadow: 0 -15px 35px rgba(0,0,0,0.4);
        }

        .masook-gradient-text {
            background: linear-gradient(135deg, #1e40af 0%, #3b82f6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .pulse {
            animation: pulse-animation 2s infinite;
        }

        @keyframes pulse-animation {
            0% { transform: scale(0.98); opacity: 0.7; }
            50% { transform: scale(1); opacity: 1; }
            100% { transform: scale(0.98); opacity: 0.7; }
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center">

    <div id="scanner-ui" class="w-full h-full">
        <div class="video-container">
            <video id="video" autoplay muted playsinline></video>
            <div class="cam-overlay"></div>
            <div class="cam-frame-border">
                <div class="scan-line"></div>
            </div>
        </div>

        <div class="fixed top-12 left-0 right-0 z-20 text-center">
            <h1 class="text-white font-extrabold text-xl uppercase tracking-[0.25em] drop-shadow-xl">Verifikasi Wajah</h1>
            <p class="text-blue-400 text-[10px] font-bold uppercase tracking-widest mt-1.5">UPTD Puskesmas Sampanahan</p>
        </div>

        <div class="bottom-card">
            <div class="w-12 h-1.5 bg-slate-100 rounded-full mx-auto mb-6"></div>
            <h2 class="masook-gradient-text font-extrabold text-xl mb-2">Pengecekan Kehadiran</h2>
            <p id="status-text" class="text-slate-400 text-xs font-bold uppercase tracking-widest pulse">Menyiapkan Kamera...</p>
            
            <div class="mt-6 flex items-center justify-center gap-2">
                <div class="w-2 h-2 bg-green-500 rounded-full shadow-[0_0_8px_rgba(34,197,94,0.6)]"></div>
                <span class="text-[10px] text-slate-500 font-bold uppercase tracking-wider">Cloud Multi-HP Aktif</span>
            </div>
        </div>
    </div>

    <div id="verify-modal" class="hidden fixed inset-0 z-[100] flex items-center justify-center bg-slate-900/95 backdrop-blur-xl p-8">
        <div class="text-center w-full max-w-xs">
            <div class="relative w-24 h-24 mx-auto mb-8">
                <div class="absolute inset-0 border-4 border-emerald-500 border-t-transparent rounded-full animate-spin"></div>
                <div class="absolute inset-0 flex items-center justify-center text-emerald-500">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7" />
                    </svg>
                </div>
            </div>
            <h2 class="text-white font-extrabold text-2xl uppercase tracking-tight italic">Wajah Dikenali</h2>
            <p class="text-emerald-400 text-[10px] font-bold uppercase mt-4 tracking-[0.2em] leading-relaxed">Mencatat Kehadiran Petugas...</p>
        </div>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzHHaHNY3KKqftUB4DkSKof4uG15dRl61AHqURfpUMpui9npiAfY6J6jURHc4n0QJXO/exec";
        let labeledDescriptors = [], userData = [], stream = null;

        // FUNGSI SINKRONISASI CLOUD (MULTI-HP)
        async function sinkronisasiData() {
            try {
                document.getElementById('status-text').innerText = "Sinkronisasi Cloud...";
                
                // 1. Ambil Config Terbaru (Jam Masuk, Radius, dll)
                const resConfig = await fetch(GAS_URL + "?action=get_config");
                const cloudConfig = await resConfig.json();
                localStorage.setItem('masook_config', JSON.stringify(cloudConfig));

                // 2. Ambil Data Petugas & Wajah Terbaru
                const resPetugas = await fetch(GAS_URL + "?action=get_petugas");
                const cloudPetugas = await resPetugas.json();
                localStorage.setItem('pkm_face_data', JSON.stringify(cloudPetugas));
                
                console.log("Data Cloud Berhasil Disinkronkan");
                return cloudPetugas;
            } catch (e) {
                console.warn("Gagal sinkron, menggunakan cache lokal");
                const cached = localStorage.getItem('pkm_face_data');
                return cached ? JSON.parse(cached) : null;
            }
        }

        window.onload = async () => {
            const MODEL_URL = 'https://justadudewhohacks.github.io/face-api.js/models';
            
            try {
                // 1. Jalankan Kamera
                startCamera();

                // 2. Load Models Face-API
                await Promise.all([
                    faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
                    faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
                    faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)
                ]);
                
                // 3. Jalankan Sinkronisasi Multi-HP
                const dataPetugas = await sinkronisasiData();
                
                if (dataPetugas) {
                    processUserData(dataPetugas);
                    document.getElementById('status-text').innerText = "Posisikan Wajah Di Lingkaran";
                } else {
                    document.getElementById('status-text').innerText = "Data Petugas Kosong";
                }

            } catch (err) {
                console.error(err);
                document.getElementById('status-text').innerText = "Gagal Memuat Sensor";
            }
        };

        function processUserData(data) {
            userData = data;
            try {
                labeledDescriptors = data.map(d => {
                    // Cek jika descriptor dalam format base64 (atob) atau string biasa
                    const descriptorArray = d.descriptor.length > 500 ? JSON.parse(atob(d.descriptor)) : JSON.parse(d.descriptor);
                    return new faceapi.LabeledFaceDescriptors(
                        d.nip.toString(), 
                        [new Float32Array(descriptorArray)]
                    );
                });
            } catch (e) {
                console.error("Kesalahan parsing descriptor:", e);
                document.getElementById('status-text').innerText = "Database Wajah Error";
            }
        }

        async function startCamera() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user", width: { ideal: 1280 }, height: { ideal: 720 } } 
                });
                document.getElementById('video').srcObject = stream;
                detectFace();
            } catch (err) {
                alert("Izin kamera diperlukan.");
            }
        }

        async function detectFace() {
            const video = document.getElementById('video');
            const config = JSON.parse(localStorage.getItem('masook_config') || "{}");
            const threshold = config.threshold || 0.6; // Mengambil threshold dari config cloud

            const interval = setInterval(async () => {
                if (labeledDescriptors.length === 0) return;

                const detection = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks().withFaceDescriptor();
                
                if (detection) {
                    const match = new faceapi.FaceMatcher(labeledDescriptors, threshold).findBestMatch(detection.descriptor);
                    
                    if (match.label !== 'unknown') {
                        clearInterval(interval);
                        
                        // 1. Tampilkan UI Berhasil
                        document.getElementById('scanner-ui').classList.add('hidden');
                        document.getElementById('verify-modal').classList.remove('hidden');

                        // 2. Matikan Kamera
                        if (stream) stream.getTracks().forEach(t => t.stop());

                        // 3. Proses Data Petugas
                        const user = userData.find(u => u.nip.toString() === match.label);
                        const jam = new Date().getHours();
                        user.tipeAbsen = jam < 12 ? "MASUK" : "PULANG";
                        user.waktuLogin = new Date().toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });

                        // 4. Simpan Status ke LocalStorage
                        localStorage.setItem('isLoggedIn', 'true');
                        localStorage.setItem('scanned_user', JSON.stringify(user));

                        // 5. Kirim data absensi ke cloud secara background (Opsional)
                        await fetch(GAS_URL, {
                            method: 'POST',
                            body: JSON.stringify({
                                action: 'kirim_absen',
                                nip: user.nip,
                                nama: user.nama,
                                jam: user.waktuLogin,
                                tipe: user.tipeAbsen,
                                status: "Hadir"
                            })
                        }).catch(e => console.log("Gagal kirim log cloud, tersimpan lokal."));
                        
                        // 6. Pindah ke Profil
                        setTimeout(() => {
                            window.location.href = 'profil.html';
                        }, 1500);
                    }
                }
            }, 500);
        }
    </script>
</body>
</html>
