<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title> Rekap Bulanan - Masook AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #f8fafc; 
            color: #1e293b;
            -webkit-font-smoothing: antialiased;
        }
        .masook-gradient {
            background: linear-gradient(135deg, #1e40af 0%, #3b82f6 100%);
        }
        .sticky-header {
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .excel-table { border-collapse: collapse; width: 100%; background: white; font-size: 12px; }
        .excel-table th { 
            background: #f8fafc; 
            border-bottom: 2px solid #e2e8f0; 
            padding: 15px 10px; 
            text-transform: uppercase; 
            color: #64748b; 
            font-weight: 800; 
            text-align: center;
        }
        .excel-table td { border-bottom: 1px solid #f1f5f9; padding: 12px 10px; color: #1e293b; }
        .excel-table tr:hover { background: #f8fafc; }
        
        .arsip-card {
            background: white;
            padding: 1rem;
            border-radius: 1.5rem;
            border: 1px solid #f1f5f9;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
        }
        .arsip-card:active { transform: scale(0.96); }

        #arsip-container {
            display: none;
            opacity: 0;
            transform: translateY(-10px);
            transition: opacity 0.3s ease, transform 0.3s ease;
        }
        #arsip-container.show {
            display: grid;
            opacity: 1;
            transform: translateY(0);
            margin-top: 1.5rem;
        }

        @media print { 
            .no-print { display: none !important; } 
            body { background: white; } 
            .pb-10 { padding-bottom: 0; }
            .sticky-header { position: relative; }
            .excel-table th { background: #eee !important; color: black !important; }
        }
    </style>
</head>
<body class="pb-10">

    <header class="sticky-header masook-gradient text-white p-6 md:p-8 rounded-b-[3rem] shadow-2xl no-print overflow-hidden">
        <div class="absolute top-0 right-0 w-32 h-32 bg-white/10 rounded-full -mr-16 -mt-16 blur-2xl"></div>
        <div class="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4 relative z-10">
            <div class="flex items-center gap-4 w-full md:w-auto">
                <button onclick="window.location.href='dasbodadmin.html'" class="w-10 h-10 bg-white/20 backdrop-blur-md rounded-xl flex items-center justify-center text-white border border-white/30 active:scale-90 transition-all">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
                <div>
                    <h1 class="font-extrabold text-lg md:text-xl tracking-tight uppercase italic text-white">Rekapitulasi</h1>
                    <p class="text-[9px] text-blue-100 font-bold uppercase tracking-widest mt-0.5">UPTD Puskesmas Sampanahan</p>
                </div>
            </div>
            
            <div class="flex gap-2 w-full md:w-auto">
                <button onclick="exportExcel()" class="flex-1 md:flex-none bg-emerald-500 hover:bg-emerald-600 px-5 py-2.5 rounded-xl text-[10px] font-extrabold uppercase tracking-widest active:scale-95 transition-all flex items-center justify-center gap-2 shadow-lg shadow-emerald-900/20">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" /></svg>
                    Excel
                </button>
                <button onclick="window.print()" class="flex-1 md:flex-none bg-white/20 hover:bg-white/30 backdrop-blur-md border border-white/30 px-5 py-2.5 rounded-xl text-[10px] font-extrabold uppercase tracking-widest active:scale-95 transition-all flex items-center justify-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z" /></svg>
                    Cetak PDF
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto p-6 relative z-20">
        
        <div class="bg-white p-6 rounded-[2.5rem] shadow-xl shadow-blue-900/5 mb-8 flex flex-wrap gap-5 items-end no-print -mt-8 border border-white">
            <div class="flex-1 min-w-[150px]">
                <label class="text-[10px] font-extrabold text-slate-400 uppercase block mb-2 ml-2 tracking-widest">Pilih Bulan</label>
                <select id="filter-bulan" class="w-full bg-slate-50 border border-slate-100 px-4 py-3.5 rounded-2xl font-bold text-sm outline-none focus:ring-2 focus:ring-blue-500 transition-all">
                    <option value="01">Januari</option><option value="02">Februari</option>
                    <option value="03">Maret</option><option value="04">April</option>
                    <option value="05">Mei</option><option value="06">Juni</option>
                    <option value="07">Juli</option><option value="08">Agustus</option>
                    <option value="09">September</option><option value="10">Oktober</option>
                    <option value="11">November</option><option value="12">Desember</option>
                </select>
            </div>
            <div class="flex-1 min-w-[120px]">
                <label class="text-[10px] font-extrabold text-slate-400 uppercase block mb-2 ml-2 tracking-widest">Tahun</label>
                <select id="filter-tahun" class="w-full bg-slate-50 border border-slate-100 px-4 py-3.5 rounded-2xl font-bold text-sm outline-none focus:ring-2 focus:ring-blue-500 transition-all">
                    <option value="2025">2025</option><option value="2026" selected>2026</option>
                    <option value="2027">2027</option>
                </select>
            </div>
            <button onclick="loadRekap()" class="masook-gradient text-white px-8 py-3.5 rounded-2xl font-extrabold text-[11px] uppercase tracking-[0.15em] shadow-lg shadow-blue-200 active:scale-95 transition-all flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
                Tampilkan
            </button>
        </div>

        <div class="bg-white p-8 rounded-[3.5rem] shadow-xl shadow-blue-900/5 overflow-hidden border border-white">
            <div class="text-center mb-10">
                <div class="w-16 h-16 masook-gradient rounded-3xl flex items-center justify-center mx-auto mb-4 shadow-lg shadow-blue-200">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01" /></svg>
                </div>
                <h2 class="font-extrabold text-2xl text-slate-800 uppercase tracking-tight text-center">Laporan Kehadiran</h2>
                <p id="periode-label" class="text-blue-500 text-[11px] font-extrabold mt-1 uppercase tracking-[0.2em] text-center">-</p>
            </div>

            <div class="overflow-x-auto">
                <table class="excel-table" id="table-rekap">
                    <thead>
                        <tr>
                            <th>No</th>
                            <th>NIP</th>
                            <th>Nama Petugas</th>
                            <th>Tanggal</th>
                            <th>Masuk</th>
                            <th>Pulang</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="rekap-body">
                        </tbody>
                </table>
            </div>
        </div>

        <section class="mt-12 no-print bg-white p-6 rounded-[2.5rem] border border-slate-100 shadow-sm">
            <button onclick="toggleArsip()" class="w-full flex items-center justify-between px-4 outline-none group">
                <div class="flex items-center gap-3">
                    <div class="w-1.5 h-6 masook-gradient rounded-full"></div>
                    <h3 class="font-extrabold text-slate-800 uppercase text-xs tracking-widest">Arsip Laporan Bulanan</h3>
                </div>
                <svg id="arsip-chevron" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-slate-400 transition-transform duration-300" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
                </svg>
            </button>
            
            <div id="arsip-container" class="grid-cols-1 md:grid-cols-3 gap-4">
                </div>
        </section>

    </main>

    <footer class="mt-10 mb-10 text-center no-print">
        <p class="text-[9px] font-extrabold text-slate-300 uppercase tracking-[0.4em]">it.barokah.net • PKM Sampanahan</p>
    </footer>

    <script>
        // PENTING: Pastikan API_URL ini adalah link "Web App" terbaru dari Apps Script Anda
        const API_URL = "https://script.google.com/macros/s/AKfycbzHHaHNY3KKqftUB4DkSKof4uG15dRl61AHqURfpUMpui9npiAfY6J6jURHc4n0QJXO/exec";
        const daftarBulan = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];
        let isProcessing = false;

        async function loadRekap(blnManual = null) {
            if (isProcessing) return;
            isProcessing = true;

            const bulan = blnManual || document.getElementById('filter-bulan').value;
            const tahun = document.getElementById('filter-tahun').value;
            const body = document.getElementById('rekap-body');
            
            if(blnManual) {
                document.getElementById('filter-bulan').value = blnManual;
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }

            document.getElementById('periode-label').innerText = `${daftarBulan[parseInt(bulan) - 1]} ${tahun}`;
            body.innerHTML = '<tr><td colspan="7" class="text-center py-16"><div class="flex flex-col items-center gap-3"><div class="w-8 h-8 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div><p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Sinkronisasi Cloud...</p></div></td></tr>';

            try {
                // Gunakan timeout untuk mencegah loading selamanya
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 15000);

                const res = await fetch(API_URL, { 
                    method: 'POST', 
                    mode: 'cors', // Penting untuk Google Apps Script
                    body: JSON.stringify({ action: "get_logs" }),
                    signal: controller.signal
                });
                
                clearTimeout(timeoutId);
                const logs = await res.json();
                
                if (!Array.isArray(logs)) {
                    throw new Error("Format data tidak valid");
                }

                const filteredData = logs.slice(1).filter(log => {
                    if (!log[0]) return false;
                    const dateParts = log[0].split('/'); 
                    // Pastikan format tanggal di Sheet sesuai (DD/MM/YYYY)
                    return dateParts[1] === bulan && dateParts[2] === tahun;
                });

                if(filteredData.length === 0) {
                    body.innerHTML = '<tr><td colspan="7" class="text-center py-16 font-extrabold text-slate-300 uppercase text-[10px] tracking-widest">Data Tidak Ditemukan di Google Sheets</td></tr>';
                    isProcessing = false;
                    return;
                }

                const fragment = document.createDocumentFragment();
                filteredData.forEach((log, index) => {
                    const tr = document.createElement('tr');
                    const statusClass = log[4] === 'TEPAT WAKTU' ? 'bg-emerald-50 text-emerald-600' : 'bg-rose-50 text-rose-600';
                    
                    tr.innerHTML = `
                        <td class="text-center text-slate-400 font-bold">${index + 1}</td>
                        <td class="font-bold text-slate-500">${log[2] || '-'}</td>
                        <td class="font-extrabold text-slate-800">${log[3] || 'Anonim'}</td>
                        <td class="text-center font-medium">${log[0]}</td>
                        <td class="text-center font-extrabold text-emerald-500">${log[1] || '--:--'}</td>
                        <td class="text-center font-extrabold text-blue-500">${log[6] || '--:--'}</td>
                        <td class="text-center">
                            <span class="px-3 py-1 rounded-full text-[9px] font-extrabold uppercase tracking-tighter ${statusClass}">
                                ${log[4] || 'UNKNOWN'}
                            </span>
                        </td>
                    `;
                    fragment.appendChild(tr);
                });

                body.innerHTML = '';
                body.appendChild(fragment);

            } catch (e) {
                console.error("Error Fetching:", e);
                body.innerHTML = `<tr><td colspan="7" class="text-center py-16 text-rose-500 font-bold uppercase text-[10px]">Gagal Menghubungkan ke Google Sheets<br><span class="text-slate-400 font-normal mt-2 block">Pastikan Apps Script sudah di-deploy dengan akses 'Anyone'</span></td></tr>`;
            } finally {
                isProcessing = false;
            }
        }

        function renderArsip() {
            const container = document.getElementById('arsip-container');
            const thn = document.getElementById('filter-tahun').value;
            let html = '';
            daftarBulan.forEach((bln, idx) => {
                const code = String(idx + 1).padStart(2, '0');
                html += `
                    <div class="arsip-card" onclick="loadRekap('${code}')">
                        <div class="flex items-center gap-4">
                            <div class="w-10 h-10 bg-blue-50 text-blue-600 rounded-2xl flex items-center justify-center">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7v8a2 2 0 002 2h6M8 7V5a2 2 0 012-2h4.586a1 1 0 01.707.293l4.414 4.414a1 1 0 01.293.707V15a2 2 0 01-2 2h-2M8 7H6a2 2 0 00-2 2v10a2 2 0 002 2h8a2 2 0 002-2v-2" /></svg>
                            </div>
                            <div>
                                <p class="text-[11px] font-extrabold text-slate-800 uppercase tracking-tight">${bln}</p>
                                <p class="text-[9px] text-slate-400 font-bold uppercase">${thn}</p>
                            </div>
                        </div>
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-slate-300" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" /></svg>
                    </div>`;
            });
            container.innerHTML = html;
        }

        function toggleArsip() {
            const container = document.getElementById('arsip-container');
            const chevron = document.getElementById('arsip-chevron');
            if (container.style.display === 'grid') {
                container.classList.remove('show');
                setTimeout(() => { container.style.display = 'none'; }, 300);
                chevron.style.transform = 'rotate(0deg)';
            } else {
                container.style.display = 'grid';
                setTimeout(() => { container.classList.add('show'); }, 10);
                chevron.style.transform = 'rotate(180deg)';
            }
        }

        function exportExcel() {
            if(isProcessing) return;
            try {
                const table = document.getElementById("table-rekap");
                const bulan = document.getElementById('filter-bulan').value;
                const tahun = document.getElementById('filter-tahun').value;
                const namaFile = `Rekap_Presensi_PKM_Sampanahan_${bulan}_${tahun}.xlsx`;
                const wb = XLSX.utils.table_to_book(table, { sheet: "Data Rekapan", raw: true });
                XLSX.writeFile(wb, namaFile);
            } catch (err) {
                alert("Gagal mengekspor data.");
            }
        }

        window.onload = () => {
            const now = new Date();
            document.getElementById('filter-bulan').value = String(now.getMonth() + 1).padStart(2, '0');
            loadRekap();
            renderArsip();
            document.getElementById('filter-tahun').addEventListener('change', renderArsip);
        };
    </script>
</body>
</html>
