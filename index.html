<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Masook - Kotabaru</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* Mengunci Scroll untuk PWA Android agar pas di layar */
        html, body { 
            position: fixed;
            overflow: hidden;
            width: 100%;
            height: 100%;
            overscroll-behavior: none;
            -webkit-user-select: none;
            user-select: none;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #f8fafc; 
            color: #1e293b;
            display: flex;
            flex-direction: column;
        }

        .masook-gradient {
            background: linear-gradient(135deg, #1e40af 0%, #3b82f6 100%);
        }

        .glass-card { 
            background: rgba(255, 255, 255, 0.85); 
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.6);
        }

        .bottom-nav { 
            background: rgba(255, 255, 255, 0.9); 
            backdrop-filter: blur(20px); 
            border-top: 1px solid rgba(0,0,0,0.05); 
        }

        /* Elegan Floating Background Animation */
        .bg-blob {
            position: absolute;
            width: 250px;
            height: 250px;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.12) 0%, rgba(255, 255, 255, 0) 70%);
            border-radius: 50%;
            z-index: -1;
            animation: float 15s infinite alternate;
        }

        @keyframes float {
            0% { transform: translate(0, 0); }
            100% { transform: translate(40px, 80px); }
        }

        .gps-badge-pulse {
            animation: gps-pulse 2s infinite ease-in-out;
        }
        @keyframes gps-pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.03); opacity: 0.9; }
        }

        @keyframes modalFade {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        /* FIX: Memperbaiki sintaks pemanggilan animasi */
        .animate-modal {
            animation: modalFade 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }
    </style>

    <meta name="theme-color" content="#3b82f6">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
</head>
<body class="pb-32">

    <div class="bg-blob top-0 -left-20"></div>
    <div class="bg-blob bottom-40 -right-20" style="animation-delay: -5s; background: radial-gradient(circle, rgba(30, 64, 175, 0.08) 0%, rgba(255, 255, 255, 0) 70%);"></div>

    <header class="masook-gradient pt-10 pb-24 px-7 rounded-b-[3rem] shadow-2xl relative overflow-hidden shrink-0">
        <div class="absolute top-0 right-0 w-40 h-40 bg-white/10 rounded-full -mr-15 -mt-15 blur-3xl"></div>
        <div class="relative z-10 flex justify-between items-start">
            <div>
                <p class="text-blue-100 text-[9px] font-bold uppercase tracking-[0.2em] mb-1">Selamat Datang</p>
                <h1 class="text-white font-extrabold text-xl tracking-tight uppercase italic leading-none">MASOOK</h1>
                <p class="text-blue-200 text-[8px] font-medium mt-1.5 uppercase tracking-wider opacity-90">UPTD PKM SAMPANAHAN</p>
            </div>
        </div>
    </header>

    <main class="-mt-14 px-5 relative z-20 flex-grow">
        <div class="glass-card p-8 rounded-[3rem] shadow-2xl shadow-blue-900/10 text-center relative overflow-hidden border-white h-auto max-h-[80vh]">
            <div class="absolute -top-20 -left-20 w-40 h-40 bg-white/40 rounded-full blur-3xl"></div>
            
            <div class="mb-4">
                <div id="current-time" class="text-4xl font-extrabold text-slate-800 tracking-tighter">00:00:00</div>
                <div id="current-date" class="text-[10px] font-bold text-slate-400 uppercase tracking-[0.2em] mt-1.5">Memuat Kalender...</div>
            </div>

            <div class="flex justify-center mb-6">
                <div id="gps-status" class="bg-white px-4 py-2 rounded-xl flex items-center gap-2.5 border border-slate-100 shadow-sm transition-all duration-700">
                    <div id="gps-dot" class="w-2.5 h-2.5 bg-slate-300 rounded-full animate-pulse"></div>
                    <span id="gps-text" class="text-slate-500 text-[10px] font-extrabold uppercase tracking-widest">GPS Sinkron</span>
                </div>
            </div>

            <div class="bg-slate-50/50 rounded-[2rem] p-5 mb-6 border border-slate-100/50">
                <div id="attendance-type" class="inline-block px-4 py-1.5 rounded-full bg-blue-50 text-blue-600 text-[9px] font-black uppercase tracking-widest mb-5 border border-blue-100 italic">
                    Memeriksa...
                </div>

                <div class="grid grid-cols-2 gap-2">
                    <div class="text-left px-1 border-r border-slate-200/50">
                        <p class="text-[7px] font-black text-slate-400 uppercase tracking-widest mb-1">Batas Sesi</p>
                        <p id="limit-time" class="text-xs font-extrabold text-slate-700 tracking-tight">--:--</p>
                    </div>
                    <div class="text-right px-1">
                        <p class="text-[7px] font-black text-slate-400 uppercase tracking-widest mb-1">Sisa Waktu</p>
                        <p id="countdown-timer" class="text-xs font-extrabold text-blue-600 tracking-tighter">--:--:--</p>
                    </div>
                </div>
            </div>

            <div class="relative w-28 h-28 mx-auto mb-5">
                <div class="w-full h-full rounded-full border-4 border-white p-1 bg-white shadow-lg overflow-hidden">
                    <img id="img-profile" src="https://via.placeholder.com/150" class="w-full h-full object-cover rounded-full hidden">
                    <div id="icon-placeholder" class="w-full h-full bg-slate-50 rounded-full flex items-center justify-center text-slate-200">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-14 w-14" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                        </svg>
                    </div>
                </div>
                <div id="verify-badge" class="hidden absolute bottom-1 right-1 bg-emerald-500 w-8 h-8 rounded-full border-[3px] border-white flex items-center justify-center text-white shadow-md">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd" />
                    </svg>
                </div>
            </div>

            <h2 id="display-name" class="font-bold text-slate-800 text-base uppercase tracking-tight">Kesiapan Presensi</h2>
            <p class="text-slate-400 text-[9px] font-medium uppercase tracking-widest mt-1">Gunakan Tombol Presensi di Bawah</p>
        </div>
    </main>

    <div id="location-modal" class="hidden fixed inset-0 z-[100] flex items-center justify-center px-6">
        <div class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm"></div>
        <div class="bg-white rounded-[2.5rem] p-9 w-full max-w-xs relative z-10 text-center shadow-2xl animate-modal border border-slate-100">
            <div id="modal-icon-container" class="w-16 h-16 bg-rose-50 text-rose-500 rounded-2xl flex items-center justify-center mx-auto mb-5 shadow-sm">
                <svg id="modal-icon" xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                </svg>
            </div>
            <h3 id="modal-title" class="font-extrabold text-slate-800 text-base uppercase tracking-tight mb-2.5">Peringatan!</h3>
            <p id="modal-desc" class="text-slate-500 text-[10px] font-semibold leading-relaxed mb-7 uppercase tracking-wider">Luar Radius Kantor</p>
            <button onclick="closeModal()" class="w-full masook-gradient text-white py-4 rounded-xl font-bold text-[10px] uppercase tracking-widest shadow-lg shadow-blue-200 active:scale-95 transition-all">
                Tutup Pesan
            </button>
        </div>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 bottom-nav px-10 py-4 flex justify-around items-center z-50 rounded-t-[2.5rem] shadow-[0_-10px_40px_rgba(0,0,0,0.05)] shrink-0">
        <button onclick="window.location.reload()" class="flex flex-col items-center gap-1.5 nav-active">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
            </svg>
            <span class="text-[8px] font-black uppercase tracking-widest">Beranda</span>
        </button>
        
        <button onclick="handleScanRedirect()" class="flex flex-col items-center gap-1.5 nav-inactive">
            <div class="w-14 h-14 masook-gradient rounded-[1.6rem] flex items-center justify-center text-white shadow-xl shadow-blue-400 -mt-12 border-[5px] border-white active:scale-90 transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M3 7V5a2 2 0 012-2h2m10 0h2a2 2 0 012 2v2m0 10v2a2 2 0 01-2 2h-2M7 21H5a2 2 0 01-2-2v-2M12 7v10m-4-5h8" />
                </svg>
            </div>
            <span class="text-[8px] font-black uppercase tracking-widest mt-1">Presensi</span>
        </button>
    </nav>

    <script>
        // Konfigurasi API
        const GAS_URL = "https://script.google.com/macros/s/AKfycbxHzx_xX3pyC00sfXd3ekFdHDX19hGS0dP9M02LFKku6HUl9l2uwsYZOi-C7ilUYx-s/exec";

        // Konfigurasi Jam Masook
        const CONFIG = {
            jamMasuk: "07:30",
            batasMasuk: "11:00",
            jamPulang: "14:30",
            batasPulang: "17:00"
        };

        const PKM_COORDS = { lat: -2.637022, lng: 116.203674 };
        let isWithinRange = false;
        let isTimeExpired = false;
        let gpsWatcher = null; // FIX: Menampung watcher agar bisa dibersihkan
        
        window.onload = () => {
            if (localStorage.getItem('isLoggedIn') === 'true') {
                window.location.href = 'profil.html';
                return;
            }
            checkGPS();
            updateTime();
            setInterval(updateTime, 1000);
        };

        function updateTime() {
            const now = new Date();
            const timeStr = now.toLocaleTimeString('id-ID', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
            document.getElementById('current-time').innerText = timeStr.replace(/\./g, ':');

            const options = { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' };
            document.getElementById('current-date').innerText = now.toLocaleDateString('id-ID', options);

            const typeLabel = document.getElementById('attendance-type');
            const limitLabel = document.getElementById('limit-time');
            const countdownLabel = document.getElementById('countdown-timer');
            
            let limitTimeStr = "";
            let currentHour = now.getHours();
            
            if (currentHour < 12) {
                typeLabel.innerText = "Sesi Pagi: Masuk";
                typeLabel.className = "inline-block px-4 py-1.5 rounded-full bg-emerald-50 text-emerald-600 text-[9px] font-black uppercase tracking-widest mb-5 border border-emerald-100 italic";
                limitTimeStr = CONFIG.batasMasuk;
            } else {
                typeLabel.innerText = "Sesi Sore: Pulang";
                typeLabel.className = "inline-block px-4 py-1.5 rounded-full bg-blue-50 text-blue-600 text-[9px] font-black uppercase tracking-widest mb-5 border border-blue-100 italic";
                limitTimeStr = CONFIG.batasPulang;
            }
            
            limitLabel.innerText = limitTimeStr + " WITA";

            const targetTime = new Date();
            const [h, m] = limitTimeStr.split(':');
            targetTime.setHours(parseInt(h), parseInt(m), 0);

            let diff = targetTime - now;

            // FIX: Logika countdown jika target waktu sudah lewat
            if (diff > 0) {
                isTimeExpired = false;
                const hours = Math.floor(diff / 3600000);
                const minutes = Math.floor((diff % 3600000) / 60000);
                const seconds = Math.floor((diff % 60000) / 1000);
                countdownLabel.innerText = `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
                countdownLabel.classList.remove('text-rose-500');
                countdownLabel.classList.add('text-blue-600');
            } else {
                isTimeExpired = true;
                countdownLabel.innerText = "HABIS";
                countdownLabel.classList.remove('text-blue-600');
                countdownLabel.classList.add('text-rose-500');
            }
        }

        function checkGPS() {
            const statusBox = document.getElementById('gps-status');
            const dot = document.getElementById('gps-dot');
            const txt = document.getElementById('gps-text');

            if (navigator.geolocation) {
                // FIX: Membersihkan watcher sebelumnya agar tidak tumpang tindih
                if (gpsWatcher !== null) {
                    navigator.geolocation.clearWatch(gpsWatcher);
                }

                gpsWatcher = navigator.geolocation.watchPosition(pos => {
                    const dist = calculateDistance(pos.coords.latitude, pos.coords.longitude, PKM_COORDS.lat, PKM_COORDS.lng);
                    if (dist <= 50) { 
                        isWithinRange = true;
                        statusBox.className = "gps-badge-pulse bg-white px-4 py-2 rounded-xl flex items-center gap-2.5 border border-emerald-100 shadow-sm transition-all duration-700";
                        dot.className = "w-2.5 h-2.5 bg-emerald-500 rounded-full shadow-[0_0_8px_rgba(16,185,129,0.4)]";
                        txt.innerText = "Area Puskesmas";
                        txt.className = "text-emerald-600 text-[10px] font-black uppercase tracking-widest";
                    } else {
                        isWithinRange = false;
                        statusBox.className = "bg-white px-4 py-2 rounded-xl flex items-center gap-2.5 border border-amber-100 shadow-sm transition-all duration-700";
                        dot.className = "w-2.5 h-2.5 bg-amber-500 rounded-full";
                        txt.innerText = "Luar Jangkauan";
                        txt.className = "text-amber-600 text-[10px] font-black uppercase tracking-widest";
                    }
                }, () => {
                    isWithinRange = false;
                    statusBox.className = "bg-white px-4 py-2 rounded-xl flex items-center gap-2.5 border border-rose-100 shadow-sm";
                    dot.className = "w-2.5 h-2.5 bg-rose-500 rounded-full";
                    txt.innerText = "GPS Bermasalah";
                    txt.className = "text-rose-600 text-[10px] font-black uppercase tracking-widest";
                }, { enableHighAccuracy: true, maximumAge: 0, timeout: 5000 });
            }
        }

        function handleScanRedirect() {
            const modal = document.getElementById('location-modal');
            const title = document.getElementById('modal-title');
            const desc = document.getElementById('modal-desc');
            const iconCont = document.getElementById('modal-icon-container');

            if (!isWithinRange) {
                title.innerText = "Luar Radius!";
                desc.innerText = "Posisikan diri Anda di dalam area Puskesmas Sampanahan.";
                iconCont.className = "w-16 h-16 bg-rose-50 text-rose-500 rounded-2xl flex items-center justify-center mx-auto mb-5 shadow-sm";
                modal.classList.remove('hidden');
                return;
            }

            if (isTimeExpired) {
                title.innerText = "Sesi Berakhir!";
                desc.innerText = "Batas waktu presensi sesi ini telah habis.";
                iconCont.className = "w-16 h-16 bg-amber-50 text-amber-500 rounded-2xl flex items-center justify-center mx-auto mb-5 shadow-sm";
                modal.classList.remove('hidden');
                return;
            }

            window.location.href = 'scan.html';
        }

        function closeModal() {
            document.getElementById('location-modal').classList.add('hidden');
        }

        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371e3;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                      Math.sin(dLon / 2) * Math.sin(dLon / 2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
            return R * c;
        }
    </script>

    <div id="pwa-install-banner" style="display:none; position:fixed; bottom:100px; left:50%; transform:translateX(-50%); z-index:99; background:#3b82f6; color:white; padding:14px 28px; border-radius:50px; box-shadow:0 12px 30px rgba(0,0,0,0.4); font-family:'Plus Jakarta Sans', sans-serif; cursor:pointer; align-items:center; gap:12px; font-weight:bold; border: 2px solid rgba(255,255,255,0.2); transition: all 0.3s ease;">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        <span>INSTAL APLIKASI</span>
    </div>

    <script>
      let deferredPrompt;
      const installBanner = document.getElementById('pwa-install-banner');

      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js')
            .then(reg => console.log('PWA Registered'))
            .catch(err => console.log('PWA Failed', err));
        });
      }

      window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        installBanner.style.display = 'flex';
      });

      installBanner.addEventListener('click', async () => {
        if (deferredPrompt) {
          deferredPrompt.prompt();
          const { outcome } = await deferredPrompt.userChoice;
          deferredPrompt = null;
          installBanner.style.display = 'none';
        }
      });

      window.addEventListener('appinstalled', () => {
        installBanner.style.display = 'none';
        deferredPrompt = null;
      });
    </script>
</body>
</html>
