<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Admin Dashboard - Masook AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #f8fafc; 
            color: #1e293b;
            user-select: none; 
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
        }
        .masook-gradient {
            background: linear-gradient(135deg, #1e40af 0%, #3b82f6 100%);
        }
        
        /* Area Header & Statistik yang Terkunci */
        .sticky-top-section {
            position: sticky;
            top: 0;
            z-index: 50;
            background: #f8fafc;
            padding-bottom: 0.5rem;
        }

        .admin-header {
            @apply pt-6 pb-14 px-6 rounded-b-[2.5rem] shadow-xl relative overflow-hidden;
        }

        .stat-card { 
            @apply bg-white p-3 md:p-4 rounded-[1.5rem] shadow-sm border border-slate-100 transition-all flex flex-col justify-center items-center text-center cursor-pointer active:scale-95; 
        }
        .stat-card.active {
            @apply border-blue-500 ring-2 ring-blue-100 shadow-md;
        }

        .log-row { 
            @apply flex justify-between items-center p-4 bg-white rounded-3xl border border-slate-50 mb-3 shadow-sm animate-fade-in; 
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }

        .badge-masuk { @apply bg-emerald-50 text-emerald-600 text-[9px] font-extrabold px-3 py-1 rounded-full uppercase tracking-tighter; }
        .badge-terlambat { @apply bg-rose-50 text-rose-600 text-[9px] font-extrabold px-3 py-1 rounded-full uppercase tracking-tighter; }
        .badge-belum { @apply bg-slate-100 text-slate-400 text-[9px] font-extrabold px-3 py-1 rounded-full uppercase tracking-tighter; }
        .badge-dl { @apply bg-blue-50 text-blue-600 text-[9px] font-extrabold px-3 py-1 rounded-full uppercase tracking-tighter; }
        
        ::-webkit-scrollbar { display: none; }

        .stat-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
        }
        .mode-pc .stat-grid { grid-template-columns: repeat(5, minmax(0, 1fr)) !important; }
        
        @media (min-width: 768px) {
            .stat-grid { grid-template-columns: repeat(5, minmax(0, 1fr)); }
        }

        main { padding-top: 1rem; }
        button { -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body class="mode-hp">

    <div class="sticky-top-section">
        <header class="masook-gradient admin-header">
            <div class="absolute top-0 right-0 w-24 h-24 bg-white/10 rounded-full -mr-10 -mt-10 blur-2xl"></div>
            <div class="max-w-6xl mx-auto relative z-10 flex justify-between items-center">
                <div>
                    <h1 class="text-white font-extrabold text-lg md:text-xl tracking-tight uppercase leading-none">Admin Panel</h1>
                    <p class="text-blue-100 text-[8px] font-medium uppercase tracking-widest mt-1 opacity-80">UPTD PKM SAMPANAHAN</p>
                </div>
                
                <div class="flex gap-2">
                    <div class="bg-white/10 backdrop-blur-md p-1 rounded-2xl border border-white/20 flex gap-1">
                        <button onclick="setMode('hp')" id="btn-hp" class="p-1.5 rounded-xl transition-all">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z" /></svg>
                        </button>
                        <button onclick="setMode('pc')" id="btn-pc" class="p-1.5 rounded-xl transition-all">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 21h6l-.75-4M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" /></svg>
                        </button>
                    </div>
                    <button onclick="window.location.href='index.html'" class="w-9 h-9 bg-white/20 backdrop-blur-md rounded-xl flex items-center justify-center text-white border border-white/30 active:scale-90 transition-all">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" /></svg>
                    </button>
                </div>
            </div>
        </header>

        <div class="max-w-6xl mx-auto px-5 -mt-5 relative z-20">
            <div id="stat-grid-container" class="stat-grid gap-3">
                <div class="stat-card shadow-lg active" onclick="filterLogs('ALL', this)">
                    <p class="text-[7px] font-extrabold text-slate-400 uppercase tracking-widest mb-0.5">Pegawai</p>
                    <h2 id="stat-total" class="font-extrabold text-lg text-slate-800">...</h2>
                </div>
                <div class="stat-card shadow-lg border-b-4 border-emerald-500" onclick="filterLogs('TEPAT WAKTU', this)">
                    <p class="text-[7px] font-extrabold text-slate-400 uppercase tracking-widest mb-0.5">Tepat</p>
                    <h2 id="stat-tepat" class="font-extrabold text-lg text-emerald-600">...</h2>
                </div>
                <div class="stat-card shadow-lg border-b-4 border-rose-500" onclick="filterLogs('TERLAMBAT', this)">
                    <p class="text-[7px] font-extrabold text-slate-400 uppercase tracking-widest mb-0.5">Telat</p>
                    <h2 id="stat-telat" class="font-extrabold text-lg text-rose-600">...</h2>
                </div>
                <div class="stat-card shadow-lg border-b-4 border-blue-500" onclick="filterLogs('DL', this)">
                    <p class="text-[7px] font-extrabold text-slate-400 uppercase tracking-widest mb-0.5">DL</p>
                    <h2 id="stat-dl" class="font-extrabold text-lg text-blue-600">...</h2>
                </div>
                <div class="stat-card shadow-lg" onclick="filterLogs('BELUM', this)">
                    <p class="text-[7px] font-extrabold text-slate-400 uppercase tracking-widest mb-0.5">Sisa</p>
                    <h2 id="stat-belum" class="font-extrabold text-lg text-slate-400">...</h2>
                </div>
            </div>
        </div>
    </div>

    <main class="max-w-6xl mx-auto px-6 relative z-10">
        <section class="pb-24">
            <div class="flex justify-between items-center mb-5 px-1">
                <div class="flex items-center gap-2">
                    <div class="w-1 h-5 masook-gradient rounded-full"></div>
                    <h3 id="log-title" class="font-extrabold text-slate-800 uppercase text-[10px] tracking-widest">Log Kehadiran Hari Ini</h3>
                </div>
                <button onclick="loadAdminData()" class="text-[9px] font-extrabold text-blue-600 uppercase tracking-widest bg-blue-50 px-3 py-1.5 rounded-xl active:scale-95 transition-all">Refresh</button>
            </div>
            
            <div id="admin-log-container" class="space-y-1">
                <div class="animate-pulse h-16 bg-white rounded-3xl w-full border border-slate-100"></div>
            </div>
        </section>
    </main>

    <footer class="fixed bottom-0 left-0 right-0 py-3 bg-white/90 backdrop-blur-md text-center border-t border-slate-100 z-40">
        <p class="text-[8px] font-extrabold text-slate-300 uppercase tracking-[0.4em]">UPTD PKM SAMPANAHAN - MASOOK v3.0</p>
    </footer>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzHHaHNY3KKqftUB4DkSKof4uG15dRl61AHqURfpUMpui9npiAfY6J6jURHc4n0QJXO/exec";
        let rawLogs = [];
        let rawPegawai = [];

        window.onload = () => {
            const savedMode = localStorage.getItem('admin_view_mode') || 'hp';
            setMode(savedMode);
            loadAdminData();
        };

        function setMode(mode) {
            const body = document.body;
            const btnHp = document.getElementById('btn-hp');
            const btnPc = document.getElementById('btn-pc');
            
            if (mode === 'pc') {
                body.classList.remove('mode-hp');
                body.classList.add('mode-pc');
                btnPc.classList.add('bg-white', 'text-blue-600', 'shadow-sm');
                btnPc.classList.remove('text-white');
                btnHp.classList.remove('bg-white', 'text-blue-600', 'shadow-sm');
                btnHp.classList.add('text-white');
            } else {
                body.classList.remove('mode-pc');
                body.classList.add('mode-hp');
                btnHp.classList.add('bg-white', 'text-blue-600', 'shadow-sm');
                btnHp.classList.remove('text-white');
                btnPc.classList.remove('bg-white', 'text-blue-600', 'shadow-sm');
                btnPc.classList.add('text-white');
            }
            localStorage.setItem('admin_view_mode', mode);
        }

        async function loadAdminData() {
            const container = document.getElementById('admin-log-container');
            container.innerHTML = `<div class="animate-pulse space-y-3">${'<div class="h-16 bg-white rounded-3xl border border-slate-100 w-full"></div>'.repeat(3)}</div>`;
            
            try {
                const [resL, resP] = await Promise.all([
                    fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: "get_logs" }) }),
                    fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: "get_pegawai" }) })
                ]);
                
                rawLogs = await resL.json();
                rawPegawai = await resP.json();

                // Hitung Statistik
                const totalPegawai = rawPegawai.length;
                const logsToday = rawLogs.slice(1); // Hilangkan Header
                
                const tepat = logsToday.filter(l => l[4] === "TEPAT WAKTU").length;
                const telat = logsToday.filter(l => l[4] === "TERLAMBAT").length;
                const dl = logsToday.filter(l => l[4] === "DL").length;
                const totalHadirNip = new Set(logsToday.map(l => String(l[2]).trim()));

                document.getElementById('stat-total').innerText = totalPegawai;
                document.getElementById('stat-tepat').innerText = tepat;
                document.getElementById('stat-telat').innerText = telat;
                document.getElementById('stat-dl').innerText = dl;
                document.getElementById('stat-belum').innerText = Math.max(0, totalPegawai - totalHadirNip.size);

                renderList(logsToday);
            } catch (e) {
                console.error(e);
                container.innerHTML = `<div class="bg-rose-50 p-10 rounded-[2.5rem] text-center border border-rose-100"><p class='text-rose-500 font-extrabold text-[10px] uppercase'>Gagal Sinkron Cloud - Periksa Koneksi</p></div>`;
            }
        }

        function filterLogs(status, element) {
            document.querySelectorAll('.stat-card').forEach(c => c.classList.remove('active'));
            element.classList.add('active');
            
            const title = document.getElementById('log-title');
            let filtered = [];

            if (status === 'ALL') {
                title.innerText = "Log Kehadiran Hari Ini";
                filtered = rawLogs.slice(1);
            } else if (status === 'BELUM') {
                title.innerText = "Daftar Pegawai Belum Absen";
                const sudahAbsenNip = rawLogs.slice(1).map(l => String(l[2]).trim());
                filtered = rawPegawai
                    .filter(p => !sudahAbsenNip.includes(String(p.nip).trim()))
                    .map(p => ["-", "-", p.nip, p.nama, "BELUM ABSEN", "Harap Melakukan Presensi"]);
            } else if (status === 'DL') {
                title.innerText = "Daftar Pegawai Dinas Luar (DL)";
                filtered = rawLogs.slice(1).filter(l => l[4] === "DL");
            } else {
                title.innerText = `Daftar Pegawai ${status}`;
                filtered = rawLogs.slice(1).filter(l => l[4] === status);
            }
            renderList(filtered);
        }

        function renderList(data) {
            const container = document.getElementById('admin-log-container');
            if (!data || data.length === 0) {
                container.innerHTML = `<div class="py-16 text-center"><p class="text-[10px] font-bold text-slate-300 uppercase tracking-[0.2em]">Tidak Ada Data Ditemukan</p></div>`;
                return;
            }
            
            container.innerHTML = data.map(log => {
                const status = log[4] || 'UNKNOWN';
                let badgeClass = 'badge-belum';
                if (status === 'TEPAT WAKTU') badgeClass = 'badge-masuk';
                if (status === 'TERLAMBAT') badgeClass = 'badge-terlambat';
                if (status === 'DL') badgeClass = 'badge-dl';

                return `
                    <div class="log-row">
                        <div class="flex items-center gap-3">
                            <div class="w-9 h-9 bg-slate-50 rounded-2xl flex items-center justify-center text-blue-600 shrink-0 border border-slate-100">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>
                            </div>
                            <div class="flex flex-col text-left">
                                <span class="font-extrabold text-slate-800 text-[10px] md:text-[11px] tracking-tight uppercase">${log[3]}</span>
                                <span class="text-[7px] text-slate-400 font-bold uppercase mt-0.5 tracking-tighter">${log[2]} - ${log[0] !== "-" ? log[0] : 'Tgl Hari Ini'}</span>
                            </div>
                        </div>
                        <div class="text-right flex flex-col items-end">
                            <span class="${badgeClass}">${status}</span>
                            <p class="text-[7px] text-slate-300 font-extrabold mt-0.5 tracking-tighter italic uppercase">${log[1] !== "-" ? log[1] : log[5]}</p>
                        </div>
                    </div>
                `;
            }).join('');
        }
    </script>
</body>
</html>
