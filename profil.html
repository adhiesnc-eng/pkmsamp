<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Profil Pegawai - Masook AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #f8fafc; 
            color: #1e293b;
            overscroll-behavior: none;
        }
        .masook-gradient {
            background: linear-gradient(135deg, #1e40af 0%, #3b82f6 100%);
        }
        .card-profile {
            background: white;
            border-radius: 3rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05);
        }
        .log-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem;
            background: white;
            border: 1px solid #f1f5f9;
            border-radius: 1.5rem;
            margin-bottom: 0.75rem;
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
        }
        /* Mencegah highlight biru saat klik di mobile */
        button { -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body class="pb-32">

    <div class="masook-gradient pt-16 pb-32 px-8 text-center relative overflow-hidden">
        <div class="absolute top-0 right-0 w-40 h-40 bg-white/10 rounded-full -mr-20 -mt-20 blur-3xl"></div>
        <div class="relative z-10">
            <div class="w-28 h-28 bg-white rounded-full mx-auto mb-5 border-4 border-white/30 overflow-hidden shadow-2xl">
                <img id="p-foto" src="https://via.placeholder.com/150" class="w-full h-full object-cover" onerror="this.src='https://ui-avatars.com/api/?name=User&background=0D8ABC&color=fff'">
            </div>
            <h2 id="p-nama" class="text-white font-extrabold text-2xl tracking-tight uppercase">Memuat Nama...</h2>
            <p id="p-nip" class="text-blue-100 text-[10px] font-bold uppercase tracking-[0.2em] mt-2">NIP: ---</p>
        </div>
    </div>

    <main class="px-6 -mt-16 relative z-20 space-y-6">
        
        <div class="card-profile p-8 text-center border border-white">
            <div class="flex flex-col items-center">
                <div class="w-12 h-12 bg-blue-50 text-blue-600 rounded-2xl flex items-center justify-center mb-4">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                </div>
                <p class="text-[10px] font-extrabold text-slate-400 uppercase tracking-widest mb-1">Kehadiran Terakhir</p>
                <h3 id="p-status" class="text-slate-800 font-extrabold text-xl uppercase tracking-tight">Memproses...</h3>
                <p id="p-waktu" class="text-blue-500 text-xs font-bold mt-2 px-4 py-1.5 bg-blue-50 rounded-full">Jam: --:--</p>
            </div>

            <div class="mt-8 pt-8 border-t border-slate-50">
                <button onclick="logout()" class="w-full bg-slate-100 text-slate-500 py-4 rounded-2xl font-bold text-[10px] uppercase tracking-widest active:scale-95 transition-all flex items-center justify-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                    </svg>
                    Keluar / Ganti Akun
                </button>
            </div>
        </div>

        <div>
            <div class="flex items-center justify-between px-2 mb-4">
                <h4 class="text-[11px] font-extrabold text-slate-500 uppercase tracking-widest">Log Aktivitas Hari Ini</h4>
                <span class="text-[9px] bg-slate-200 px-2 py-1 rounded text-slate-600 font-bold uppercase" id="current-date">-- --- 2026</span>
            </div>

            <div id="log-container">
                <div class="log-item">
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 bg-emerald-50 text-emerald-600 rounded-xl flex items-center justify-center text-sm font-bold">IN</div>
                        <div>
                            <p class="text-[11px] font-extrabold text-slate-800 uppercase">Absen Masuk</p>
                            <p class="text-[9px] text-slate-400 font-medium tracking-tighter uppercase">Area Puskesmas</p>
                        </div>
                    </div>
                    <div class="text-right">
                        <p id="log-in-time" class="text-sm font-black text-slate-700">--:--</p>
                        <p id="log-in-status" class="text-[8px] text-slate-400 font-bold uppercase italic">Memproses</p>
                    </div>
                </div>

                <div class="log-item">
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 bg-orange-50 text-orange-600 rounded-xl flex items-center justify-center text-sm font-bold">OUT</div>
                        <div>
                            <p class="text-[11px] font-extrabold text-slate-800 uppercase">Absen Pulang</p>
                            <p class="text-[9px] text-slate-400 font-medium tracking-tighter uppercase">Area Puskesmas</p>
                        </div>
                    </div>
                    <div class="text-right">
                        <p id="log-out-time" class="text-sm font-black text-slate-700">--:--</p>
                        <p id="log-out-status" class="text-[8px] text-orange-400 font-bold uppercase italic">Belum Absen</p>
                    </div>
                </div>
            </div>
        </div>

    </main>

    <div class="fixed bottom-10 left-0 right-0 text-center pointer-events-none opacity-50">
        <p class="text-[8px] font-bold text-slate-400 uppercase tracking-[0.4em]">it.barokah.net • v2.0</p>
    </div>

    <script>
        // API URL (Updated)
        const GAS_API_URL = "https://script.google.com/macros/s/AKfycbxHzx_xX3pyC00sfXd3ekFdHDX19hGS0dP9M02LFKku6HUl9l2uwsYZOi-C7ilUYx-s/exec";

        window.onload = () => {
            const data = localStorage.getItem('scanned_user');
            // FIX BUG: Pastikan data ada dan parse aman
            if (!data) { 
                window.location.href = 'index.html'; 
                return; 
            }
            
            try {
                const user = JSON.parse(data);
                
                // Render Profile Data
                document.getElementById('p-nama').innerText = user.nama || "Pegawai Masook";
                document.getElementById('p-nip').innerText = "NIP: " + (user.nip || "---");
                if(user.foto) document.getElementById('p-foto').src = user.foto;
                
                document.getElementById('p-status').innerText = user.tipeAbsen || "Selesai";
                document.getElementById('p-waktu').innerText = "Terdeteksi Jam: " + (user.waktuLogin || "--:--");

                // Render Tanggal Dinamis
                const now = new Date();
                const options = { day: 'numeric', month: 'short', year: 'numeric' };
                document.getElementById('current-date').innerText = now.toLocaleDateString('id-ID', options);

                // Logic Log Dinamis
                const inTimeEl = document.getElementById('log-in-time');
                const inStatusEl = document.getElementById('log-in-status');
                const outTimeEl = document.getElementById('log-out-time');
                const outStatusEl = document.getElementById('log-out-status');

                if(user.tipeAbsen === "MASUK") {
                    inTimeEl.innerText = user.waktuLogin;
                    inStatusEl.innerText = "Berhasil";
                    inStatusEl.className = "text-[8px] text-emerald-500 font-bold uppercase";
                    
                    outTimeEl.innerText = "--:--";
                    outStatusEl.innerText = "Belum Absen";
                } else if(user.tipeAbsen === "PULANG") {
                    // Jika pulang, asumsikan masuk sudah dilakukan (Bisa disesuaikan dengan data DB)
                    inTimeEl.innerText = "07:30"; 
                    inStatusEl.innerText = "Berhasil";
                    inStatusEl.className = "text-[8px] text-emerald-500 font-bold uppercase";

                    outTimeEl.innerText = user.waktuLogin;
                    outStatusEl.innerText = "Berhasil";
                    outStatusEl.className = "text-[8px] text-emerald-500 font-bold uppercase";
                }
            } catch (e) {
                console.error("Data error", e);
                window.location.href = 'index.html';
            }
        };

        function logout() {
            if(confirm("Apakah Anda ingin keluar atau ganti akun?")) {
                // Menghapus sesi secara bersih
                localStorage.removeItem('isLoggedIn');
                localStorage.removeItem('scanned_user');
                window.location.href = 'index.html';
            }
        }
    </script>
</body>
</html>
