<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Registrasi Petugas - Masook AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #f8fafc; 
            user-select: none; 
            color: #1e293b;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .masook-gradient-dinkes {
            background: linear-gradient(135deg, #059669 0%, #10b981 100%);
        }
        .glass-card { 
            background: white; 
            border: 1px solid #f1f5f9;
        }
        .input-field { 
            @apply w-full bg-slate-50 border border-slate-200 px-5 py-3.5 rounded-2xl font-semibold focus:ring-2 focus:ring-emerald-500 focus:bg-white outline-none transition-all text-sm mb-4; 
        }
        .label-style { 
            @apply text-[10px] font-extrabold text-slate-400 uppercase ml-2 mb-1.5 block tracking-wider; 
        }
        
        @keyframes bounceIn {
            0% { transform: scale(0.9); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .animate-bounceIn { 
            animation: bounceIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }

        .pulse-emerald {
            animation: pulse-emerald 2s infinite;
        }
        @keyframes pulse-emerald {
            0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(16, 185, 129, 0); }
            100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }

        /* Camera Overlay Styles */
        .video-container {
            position: relative;
            width: 260px;
            height: 260px;
            margin: 0 auto;
            border-radius: 50%;
            overflow: hidden;
            border: 4px solid #10b981;
            background: #000;
        }
        #video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }
        .scan-line {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: rgba(16, 185, 129, 0.7);
            box-shadow: 0 0 15px #10b981;
            animation: scanning 2s infinite ease-in-out;
        }
        @keyframes scanning {
            0%, 100% { top: 10%; }
            50% { top: 90%; }
        }

        @media screen and (max-width: 768px) {
            input { font-size: 16px !important; }
        }
    </style>
</head>
<body class="flex flex-col">

    <div class="masook-gradient-dinkes pt-12 pb-24 px-8 rounded-b-[3.5rem] shadow-2xl relative overflow-hidden shrink-0">
        <div class="absolute top-0 right-0 w-32 h-32 bg-white/10 rounded-full -mr-16 -mt-16 blur-2xl"></div>
        <div class="relative z-10 flex flex-col items-center text-center">
            <button onclick="window.location.href='index.html'" class="absolute left-0 top-1 w-10 h-10 bg-white/20 backdrop-blur-md rounded-xl flex items-center justify-center text-white border border-white/30 active:scale-90 transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7" />
                </svg>
            </button>
            <div class="w-14 h-14 bg-white/20 backdrop-blur-md rounded-2xl flex items-center justify-center mb-3 border border-white/30 shadow-inner">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z" />
                </svg>
            </div>
            <h1 class="text-white font-extrabold text-xl tracking-tight uppercase leading-none">Registrasi Petugas</h1>
            <p class="text-emerald-100 text-[9px] font-bold uppercase tracking-[0.2em] mt-2 opacity-90">UPTD PKM Sampanahan</p>
        </div>
    </div>

    <main id="reg-form-container" class="max-w-md mx-auto w-full px-6 -mt-10 relative z-20 flex-grow pb-10">
        <div class="glass-card p-7 rounded-[2.5rem] shadow-2xl shadow-emerald-900/5">
            <div class="flex items-center gap-2 mb-6">
                <div class="w-1 h-5 bg-emerald-500 rounded-full"></div>
                <h2 class="text-slate-800 font-extrabold text-[11px] uppercase tracking-widest">Identitas Pegawai Baru</h2>
            </div>

            <div class="mb-1">
                <label class="label-style">Nomor Induk Pegawai (NIP)</label>
                <input type="number" id="reg-nip" inputmode="numeric" placeholder="Masukkan 18 digit NIP..." class="input-field">
            </div>

            <div class="mb-6">
                <label class="label-style">Nama Lengkap Petugas</label>
                <input type="text" id="reg-nama" placeholder="Ketik nama sesuai KTP..." class="input-field">
            </div>

            <button id="btn-simpan" onclick="prosesSimpan()" class="pulse-emerald w-full masook-gradient-dinkes text-white py-4 rounded-2xl font-extrabold text-[11px] uppercase tracking-widest shadow-lg shadow-emerald-100 active:scale-[0.97] transition-all flex items-center justify-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4" />
                </svg>
                <span id="btn-text">Simpan Data & Lanjut Scan</span>
            </button>
        </div>
    </main>

    <main id="reg-scan-container" class="hidden max-w-md mx-auto w-full px-6 -mt-10 relative z-20 flex-grow pb-10">
        <div class="glass-card p-7 rounded-[3rem] shadow-2xl text-center">
            <div class="mb-6">
                <h2 class="text-slate-800 font-extrabold text-[12px] uppercase tracking-widest">Pendaftaran Wajah</h2>
                <p id="scan-status" class="text-emerald-500 text-[10px] font-bold animate-pulse mt-1">Menginisialisasi Kamera...</p>
            </div>

            <div class="video-container mb-8">
                <video id="video" autoplay muted playsinline></video>
                <div class="scan-line"></div>
            </div>

            <div class="bg-slate-50 rounded-2xl p-4 mb-6 border border-slate-100">
                <p id="user-info-display" class="text-[11px] font-bold text-slate-700 uppercase tracking-tight">Memuat...</p>
            </div>

            <button id="btn-capture" disabled onclick="ambilWajah()" class="w-full bg-slate-200 text-slate-400 py-4 rounded-2xl font-extrabold text-[11px] uppercase tracking-widest transition-all">
                Tunggu Sensor...
            </button>
        </div>
    </main>

    <div class="py-6 text-center shrink-0">
        <p class="text-[8px] font-extrabold text-slate-300 uppercase tracking-[0.4em]">Masook System • v3.0</p>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxHzx_xX3pyC00sfXd3ekFdHDX19hGS0dP9M02LFKku6HUl9l2uwsYZOi-C7ilUYx-s/exec"; 
        let currentStream = null;
        let faceDescriptor = null;

        async function prosesSimpan() {
            const nip = document.getElementById('reg-nip').value.trim();
            const nama = document.getElementById('reg-nama').value.trim();
            const btn = document.getElementById('btn-simpan');

            if (!nip || !nama) {
                alert("⚠️ Mohon lengkapi NIP dan Nama Petugas!");
                return;
            }

            btn.disabled = true;
            btn.innerHTML = `<span>Menghubungkan Cloud...</span>`;

            try {
                // Simpan data NIP & Nama ke Google Sheets
                await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        action: 'register_data_only',
                        nip: nip,
                        nama: nama
                    })
                });

                // Simpan ke localStorage sementara
                localStorage.setItem('temp_reg_user', JSON.stringify({ nip, nama }));
                
                // Pindah ke UI Scan Kamera
                tampilkanScanner(nama);

            } catch (err) {
                console.error(err);
                alert("❌ Gagal terhubung ke Cloud.");
                btn.disabled = false;
                btn.innerHTML = `Simpan Data & Lanjut Scan`;
            }
        }

        async function tampilkanScanner(nama) {
            document.getElementById('reg-form-container').classList.add('hidden');
            document.getElementById('reg-scan-container').classList.remove('hidden');
            document.getElementById('user-info-display').innerText = `Petugas: ${nama}`;
            
            await initCamera();
        }

        async function initCamera() {
            const status = document.getElementById('scan-status');
            const video = document.getElementById('video');
            const btnCapture = document.getElementById('btn-capture');
            const MODEL_URL = 'https://justadudewhohacks.github.io/face-api.js/models';

            try {
                status.innerText = "Memuat AI Sensor...";
                await Promise.all([
                    faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
                    faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
                    faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)
                ]);

                currentStream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user", width: 640, height: 480 } 
                });
                video.srcObject = currentStream;

                // Loop Deteksi Wajah
                const detectLoop = setInterval(async () => {
                    const detection = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions())
                        .withFaceLandmarks()
                        .withFaceDescriptor();

                    if (detection) {
                        status.innerText = "Wajah Terdeteksi! Tetap Diam";
                        status.className = "text-emerald-500 text-[10px] font-bold";
                        btnCapture.disabled = false;
                        btnCapture.className = "w-full masook-gradient-dinkes text-white py-4 rounded-2xl font-extrabold text-[11px] uppercase tracking-widest shadow-lg active:scale-95 transition-all";
                        btnCapture.innerText = "Daftarkan Wajah Sekarang";
                        faceDescriptor = Array.from(detection.descriptor);
                    } else {
                        status.innerText = "Posisikan Wajah di Lingkaran";
                        status.className = "text-amber-500 text-[10px] font-bold";
                        btnCapture.disabled = true;
                        btnCapture.className = "w-full bg-slate-200 text-slate-400 py-4 rounded-2xl font-extrabold text-[11px] uppercase tracking-widest";
                        btnCapture.innerText = "Tunggu Sensor...";
                    }
                }, 1000);

            } catch (err) {
                console.error(err);
                status.innerText = "Kamera Gagal Diakses";
            }
        }

        async function ambilWajah() {
            const btn = document.getElementById('btn-capture');
            const status = document.getElementById('scan-status');
            const user = JSON.parse(localStorage.getItem('temp_reg_user'));

            if (!faceDescriptor) return;

            btn.disabled = true;
            btn.innerText = "Mendaftarkan...";
            status.innerText = "Sinkronisasi Biometrik...";

            try {
                // Kirim Descriptor Wajah ke Server (Sheet Petugas Kolom Descriptor)
                // Format: Descriptor diubah ke Base64 agar aman di Sheet
                const base64Descriptor = btoa(JSON.stringify(faceDescriptor));

                await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        action: 'update_face_descriptor',
                        nip: user.nip,
                        descriptor: base64Descriptor
                    })
                });

                status.innerText = "Registrasi Berhasil!";
                alert("✅ Registrasi Biometrik Berhasil! Anda sudah bisa melakukan presensi.");
                
                // Stop Kamera & Redirect
                if(currentStream) currentStream.getTracks().forEach(track => track.stop());
                localStorage.removeItem('temp_reg_user');
                window.location.replace('index.html');

            } catch (err) {
                alert("❌ Gagal mendaftarkan wajah. Coba lagi.");
                btn.disabled = false;
                btn.innerText = "Daftarkan Wajah Sekarang";
            }
        }
    </script>
</body>
</html>
