<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Registrasi - Masook AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; }
        .masook-gradient-dinkes { background: linear-gradient(135deg, #059669 0%, #10b981 100%); }
        .video-container { position: relative; width: 260px; height: 260px; margin: 0 auto; border-radius: 50%; overflow: hidden; border: 4px solid #10b981; background: #000; }
        #video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        .scan-line { position: absolute; top: 0; width: 100%; height: 4px; background: #10b981; animation: scanning 2s infinite ease-in-out; }
        @keyframes scanning { 0%, 100% { top: 10%; } 50% { top: 90%; } }
        .btn-disabled { background: #e2e8f0 !important; color: #94a3b8 !important; cursor: not-allowed; }
    </style>
</head>
<body class="flex flex-col min-h-screen">
    <div class="masook-gradient-dinkes pt-12 pb-24 px-8 rounded-b-[3.5rem] shadow-2xl text-center text-white">
        <h1 class="font-extrabold text-xl uppercase">Registrasi Petugas</h1>
        <p class="text-[9px] font-bold uppercase tracking-widest mt-2">UPTD PKM Sampanahan</p>
    </div>

    <main id="reg-form-container" class="max-w-md mx-auto w-full px-6 -mt-10 z-20">
        <div class="bg-white p-7 rounded-[2.5rem] shadow-xl">
            <label class="text-[10px] font-extrabold text-slate-400 uppercase ml-2 mb-1.5 block">NIP (18 Digit)</label>
            <input type="number" id="reg-nip" class="w-full bg-slate-50 border border-slate-200 px-5 py-3.5 rounded-2xl mb-4 outline-none focus:ring-2 focus:ring-emerald-500">
            <label class="text-[10px] font-extrabold text-slate-400 uppercase ml-2 mb-1.5 block">Nama Lengkap</label>
            <input type="text" id="reg-nama" class="w-full bg-slate-50 border border-slate-200 px-5 py-3.5 rounded-2xl mb-6 outline-none focus:ring-2 focus:ring-emerald-500">
            <button onclick="prosesSimpan()" id="btn-simpan" class="w-full masook-gradient-dinkes text-white py-4 rounded-2xl font-extrabold uppercase tracking-widest shadow-lg active:scale-95 transition-all">Simpan & Lanjut Scan</button>
        </div>
    </main>

    <main id="reg-scan-container" class="hidden max-w-md mx-auto w-full px-6 -mt-10 z-20">
        <div class="bg-white p-7 rounded-[3rem] shadow-xl text-center">
            <p id="scan-status" class="text-emerald-500 text-[10px] font-bold animate-pulse mb-4">Menginisialisasi Kamera...</p>
            <div class="video-container mb-8">
                <video id="video" autoplay muted playsinline></video>
                <div class="scan-line"></div>
            </div>
            <p id="user-info-display" class="text-[11px] font-bold text-slate-700 uppercase mb-6"></p>
            <button id="btn-capture" disabled onclick="ambilWajah()" class="w-full btn-disabled py-4 rounded-2xl font-extrabold uppercase transition-all">Tunggu Sensor...</button>
        </div>
    </main>

    <div class="py-6 text-center mt-auto">
        <p class="text-[8px] font-extrabold text-slate-300 uppercase tracking-[0.4em]">Masook System • v3.0</p>
    </div>

    <script>
        // URL WEB APP GAS - Pastikan sudah di-deploy sebagai 'Anyone'
        const API_URL = "https://script.google.com/macros/s/AKfycbxHzx_xX3pyC00sfXd3ekFdHDX19hGS0dP9M02LFKku6HUl9l2uwsYZOi-C7ilUYx-s/exec";
        let currentStream = null, faceDescriptor = null, isDetecting = false;

        async function prosesSimpan() {
            const nipInp = document.getElementById('reg-nip');
            const namaInp = document.getElementById('reg-nama');
            const btn = document.getElementById('btn-simpan');

            if (!nipInp.value || !namaInp.value) return alert("⚠️ Mohon lengkapi NIP dan Nama!");
            
            btn.disabled = true;
            btn.innerText = "Menghubungkan Cloud...";

            try {
                const res = await fetch(API_URL, { 
                    method: 'POST', 
                    body: JSON.stringify({ 
                        action: 'register_data_only', 
                        nip: nipInp.value.toString(), 
                        nama: namaInp.value.trim() 
                    }) 
                });
                const result = await res.json();
                
                if (result.status === "success" || result.success) {
                    localStorage.setItem('temp_reg_user', JSON.stringify({ nip: nipInp.value.toString(), nama: namaInp.value.trim() }));
                    document.getElementById('reg-form-container').classList.add('hidden');
                    document.getElementById('reg-scan-container').classList.remove('hidden');
                    document.getElementById('user-info-display').innerText = `Petugas: ${namaInp.value}`;
                    initCamera();
                } else {
                    throw new Error(result.message || "Gagal simpan data");
                }
            } catch (e) { 
                console.error(e);
                alert("❌ Gagal koneksi cloud: " + e.message); 
                btn.disabled = false;
                btn.innerText = "Simpan & Lanjut Scan";
            }
        }

        async function initCamera() {
            const status = document.getElementById('scan-status');
            const MODEL_URL = 'https://justadudewhohacks.github.io/face-api.js/models';
            
            try {
                status.innerText = "Memuat AI Sensor...";
                await Promise.all([
                    faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
                    faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
                    faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)
                ]);

                currentStream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user", width: { ideal: 640 }, height: { ideal: 480 } } 
                });
                
                const videoEl = document.getElementById('video');
                videoEl.srcObject = currentStream;
                
                videoEl.onloadedmetadata = () => {
                    isDetecting = true;
                    status.innerText = "Posisikan Wajah di Lingkaran";
                    runDetection();
                };
            } catch (e) { 
                status.innerText = "Kamera Gagal Diakses";
                alert("❌ Izin kamera diperlukan untuk mendaftar wajah."); 
            }
        }

        async function runDetection() {
            if (!isDetecting) return;
            const videoEl = document.getElementById('video');
            const btn = document.getElementById('btn-capture');
            const status = document.getElementById('scan-status');

            try {
                const detection = await faceapi.detectSingleFace(videoEl, new faceapi.TinyFaceDetectorOptions({ inputSize: 160, scoreThreshold: 0.5 }))
                    .withFaceLandmarks()
                    .withFaceDescriptor();

                if (detection) {
                    faceDescriptor = Array.from(detection.descriptor);
                    status.innerText = "Wajah Terdeteksi! Tetap Diam...";
                    status.className = "text-emerald-500 text-[10px] font-bold";
                    btn.disabled = false; 
                    btn.className = "w-full masook-gradient-dinkes text-white py-4 rounded-2xl font-extrabold uppercase shadow-lg active:scale-95";
                    btn.innerText = "Daftarkan Wajah Sekarang";
                } else {
                    btn.disabled = true;
                    btn.className = "w-full btn-disabled py-4 rounded-2xl font-extrabold uppercase";
                    btn.innerText = "Mencari Wajah...";
                }
            } catch (e) {
                console.warn("Detection loop error:", e);
            }

            if (isDetecting) requestAnimationFrame(runDetection);
        }

        async function ambilWajah() {
            const userStr = localStorage.getItem('temp_reg_user');
            if (!userStr || !faceDescriptor) return;
            
            const user = JSON.parse(userStr);
            const btn = document.getElementById('btn-capture');
            const status = document.getElementById('scan-status');

            isDetecting = false; 
            btn.disabled = true;
            btn.innerText = "Proses Penyimpanan...";
            
            // 1. Simpan di Lokal Terlebih Dahulu (Backup)
            const descriptorStr = JSON.stringify(faceDescriptor);
            const localData = {
                nip: user.nip,
                nama: user.nama,
                descriptor: descriptorStr,
                timestamp: new Date().getTime()
            };
            
            let faceDb = JSON.parse(localStorage.getItem('pkm_face_data') || "[]");
            faceDb = faceDb.filter(f => f.nip !== localData.nip);
            faceDb.push(localData);
            localStorage.setItem('pkm_face_data', JSON.stringify(faceDb));

            // 2. Kirim ke Database Cloud
            status.innerText = "Sinkronisasi ke Cloud...";

            try {
                // Perbaikan Payload: Descriptor dikirim sebagai string tunggal, bukan double stringify
                const response = await fetch(API_URL, {
                    method: 'POST',
                    mode: 'no-cors', // Gunakan no-cors jika fetch standar gagal karena kebijakan CORS Google
                    body: JSON.stringify({ 
                        action: 'update_face_descriptor', 
                        nip: localData.nip, 
                        descriptor: descriptorStr 
                    })
                });

                // Karena no-cors tidak bisa membaca JSON response, beri jeda dan asumsikan sukses jika tidak error fetch
                status.innerText = "Berhasil Terdaftar!";
                alert("✅ Wajah Berhasil Disimpan!\nData telah aman di perangkat dan sedang disinkronkan ke server.");
                
                if(currentStream) currentStream.getTracks().forEach(track => track.stop());
                localStorage.removeItem('temp_reg_user');
                window.location.replace('index.html');
                
            } catch (e) { 
                console.error("Cloud Error:", e);
                alert("⚠️ Tersimpan di Lokal, namun gagal sinkron ke Cloud: " + e.message + "\nData akan terupdate otomatis saat presensi."); 
                
                if(currentStream) currentStream.getTracks().forEach(track => track.stop());
                localStorage.removeItem('temp_reg_user');
                window.location.replace('index.html');
            }
        }
    </script>
</body>
</html>
